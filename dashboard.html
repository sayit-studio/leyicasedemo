<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儀表板 — 管理後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-shell">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🏛️</div>
      <div class="brand-text">
        <div class="brand-name">市民服務平台</div>
        <div class="brand-role">Admin Console</div>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="sidebarAvatar">A</div>
      <div class="user-info">
        <div class="user-name" id="sidebarUserName">載入中…</div>
        <span class="user-tag" id="sidebarUserTag">幕僚</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group-label">主要功能</div>

      <div class="nav-item active" data-page="dashboard" onclick="Sidebar.navigate('dashboard')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">儀表板</span>
      </div>
      <div class="nav-item" data-page="cases" onclick="Sidebar.navigate('cases')">
        <span class="nav-icon">📋</span>
        <span class="nav-label">案件管理</span>
        <span class="nav-badge" id="pendingBadge" style="display:none">0</span>
      </div>
      <div class="nav-item" data-page="cases-new" onclick="Sidebar.navigate('cases-new')">
        <span class="nav-icon">✏️</span>
        <span class="nav-label">新增案件</span>
      </div>

      <!-- 政績版專屬 -->
      <div class="nav-group-label" id="navGroupAchievement" style="display:none">政績版功能</div>
      <div class="nav-item" data-page="inspections" onclick="Sidebar.navigate('inspections')" id="navInspections" style="display:none">
        <span class="nav-icon">🏗️</span>
        <span class="nav-label">現場會勘</span>
      </div>
      <div class="nav-item" data-page="interpellations" onclick="Sidebar.navigate('interpellations')" id="navInterpellations" style="display:none">
        <span class="nav-icon">🎤</span>
        <span class="nav-label">國會質詢</span>
      </div>
      <div class="nav-item" data-page="proposals" onclick="Sidebar.navigate('proposals')" id="navProposals" style="display:none">
        <span class="nav-icon">📜</span>
        <span class="nav-label">國會提案</span>
      </div>

      <div class="nav-group-label" data-role="admin">管理功能</div>
      <div class="nav-item" data-page="users" onclick="Sidebar.navigate('users')" data-role="admin">
        <span class="nav-icon">👥</span>
        <span class="nav-label">帳號管理</span>
      </div>
      <div class="nav-item" data-page="settings" onclick="Sidebar.navigate('settings')" data-role="admin">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">系統設定</span>
      </div>
      <div class="nav-item" data-page="super-admin" onclick="Sidebar.navigate('super-admin')" data-role="super_admin">
        <span class="nav-icon">🔑</span>
        <span class="nav-label">Super Admin</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-toggle" onclick="Sidebar.toggle()">
        <span class="toggle-icon">◀</span>
        <span class="toggle-label">收合選單</span>
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main-content" id="mainContent">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <div class="topbar-title">儀表板</div>
        <div class="topbar-subtitle" id="topbarDate">載入中…</div>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="loadAll()" title="重新整理">🔄</button>
        <button class="topbar-btn" onclick="Sidebar.navigate('cases-new')" title="新增案件">➕</button>
        <button class="topbar-btn" onclick="Auth.logout()" title="登出">🚪</button>
      </div>
    </div>

    <!-- Page Area -->
    <div class="page-area">

      <!-- 統計卡片 -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-card-bg">📋</div>
          <div class="stat-label">累積登錄件數</div>
          <div class="stat-num" id="st-total">—</div>
          <div class="stat-sub"><span class="stat-trend up" id="st-total-trend"></span></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-bg">⏳</div>
          <div class="stat-label">待受理 / 處理中</div>
          <div class="stat-num" id="st-active">—</div>
          <div class="stat-sub">需要跟進</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-bg">✅</div>
          <div class="stat-label">結案率</div>
          <div class="stat-num" id="st-rate">—</div>
          <div class="stat-sub" id="st-rate-sub"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-bg">⚡</div>
          <div class="stat-label">平均處理天數</div>
          <div class="stat-num" id="st-avg">—</div>
          <div class="stat-sub">天</div>
        </div>
      </div>

      <!-- 近期案件 + 快速操作 -->
      <div class="grid-2 section-gap">

        <!-- 近期案件 -->
        <div class="neu-card">
          <div class="card-title">
            <span class="card-icon">📋</span>
            近期案件
            <div style="margin-left:auto">
              <button class="btn btn-sm" onclick="Sidebar.navigate('cases')">查看全部</button>
            </div>
          </div>
          <div id="recentCasesWrap">
            <div class="loading-row"><div class="spinner"></div>載入中…</div>
          </div>
        </div>

        <!-- 快速操作 + 逾期警示 -->
        <div style="display:flex;flex-direction:column;gap:20px;">

          <!-- 逾期警示 -->
          <div class="neu-card" id="overdueCard" style="display:none;">
            <div class="card-title">
              <span class="card-icon">⚠️</span>
              逾期警示
              <span class="nav-badge" id="overdueBadge">0</span>
            </div>
            <div id="overdueList"></div>
          </div>

          <!-- 快速操作 -->
          <div class="neu-card">
            <div class="card-title"><span class="card-icon">⚡</span>快速操作</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <button class="btn" onclick="Sidebar.navigate('cases-new')" style="flex-direction:column;padding:16px;gap:6px;height:auto;">
                <span style="font-size:24px;">✏️</span>
                <span style="font-size:12px;">新增案件</span>
              </button>
              <button class="btn" onclick="Sidebar.navigate('cases')" style="flex-direction:column;padding:16px;gap:6px;height:auto;">
                <span style="font-size:24px;">📋</span>
                <span style="font-size:12px;">案件列表</span>
              </button>
              <button class="btn" onclick="exportCSV()" style="flex-direction:column;padding:16px;gap:6px;height:auto;" id="exportBtn">
                <span style="font-size:24px;">📥</span>
                <span style="font-size:12px;">匯出 CSV</span>
              </button>
              <button class="btn" onclick="Sidebar.navigate('settings')" style="flex-direction:column;padding:16px;gap:6px;height:auto;">
                <span style="font-size:24px;">⚙️</span>
                <span style="font-size:12px;">系統設定</span>
              </button>
            </div>
          </div>

          <!-- 本月概況 -->
          <div class="neu-card">
            <div class="card-title"><span class="card-icon">📅</span>本月概況</div>
            <div style="display:flex;flex-direction:column;gap:12px;" id="monthStats">
              <div class="loading-row"><div class="spinner"></div></div>
            </div>
          </div>

        </div>
      </div>

      <!-- 案件類別分布 -->
      <div class="neu-card section-gap">
        <div class="card-title"><span class="card-icon">🥧</span>案件類別分布</div>
        <div id="typeDistWrap" style="display:flex;flex-wrap:wrap;gap:12px;">
          <div class="loading-row"><div class="spinner"></div>載入中…</div>
        </div>
      </div>

    </div><!-- /page-area -->
  </div><!-- /main-content -->
</div><!-- /admin-shell -->

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="js/admin.js"></script>
<script>
// ── 初始化
Auth.require('staff');

document.getElementById('topbarDate').textContent =
  new Date().toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

// 政績版顯示額外導覽
(function checkMode() {
  const mode = localStorage.getItem('system_mode') || 'transparent';
  if (mode === 'achievement') {
    ['navGroupAchievement','navInspections','navInterpellations','navProposals']
      .forEach(id => { const el = document.getElementById(id); if(el) el.style.display = ''; });
  }
})();

// 匯出 CSV 只有 admin+
if (!Auth.isAdmin()) document.getElementById('exportBtn').style.display = 'none';

async function loadAll() {
  loadStats();
  loadRecentCases();
}

// ── 載入統計
async function loadStats() {
  const data = await API.stats.get();
  if (!data) return;

  const total   = data.totalPetitions  || 0;
  const closed  = data.closedPetitions || 0;
  const pending = data.pendingCount    || 0;
  const process = data.processingCount || 0;
  const rate    = total > 0 ? Math.round((closed/total)*100) : 0;

  document.getElementById('st-total').textContent = total.toLocaleString();
  document.getElementById('st-active').textContent = (pending + process).toLocaleString();
  document.getElementById('st-rate').textContent  = rate + '%';
  document.getElementById('st-rate-sub').textContent = `已結案 ${closed} 件`;
  document.getElementById('st-avg').textContent   = data.avgDays || 0;

  // 本月
  const mn  = data.monthNew     || 0;
  const mc  = data.monthClosed  || 0;
  const mp  = data.monthProgress|| 0;
  document.getElementById('monthStats').innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-inner);font-size:14px;">
      <span style="color:var(--text-muted)">本月新增</span>
      <strong>${mn} 件</strong>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-inner);font-size:14px;">
      <span style="color:var(--text-muted)">本月結案</span>
      <strong style="color:var(--success)">${mc} 件</strong>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:14px;">
      <span style="color:var(--text-muted)">處理中</span>
      <strong style="color:var(--primary-dark)">${mp} 件</strong>
    </div>`;

  // 類別分布
  const types = data.typeCounts || {};
  const total2 = Object.values(types).reduce((a,b)=>a+b,0) || 1;
  const colors = ['#7B9FE0','#6ECBA8','#F5B97A','#EF8080','#B07BE0','#80C8EF','#E8A87C','#82C5A0'];
  document.getElementById('typeDistWrap').innerHTML = Object.entries(types)
    .sort((a,b)=>b[1]-a[1])
    .map(([type, cnt], i) => {
      const pct = Math.round((cnt/total2)*100);
      return `<div style="flex:1;min-width:160px;background:var(--bg);border-radius:var(--r);box-shadow:var(--neu-in-sm);padding:14px 16px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;">
          <span style="font-weight:600">${type}</span>
          <span style="color:var(--text-muted)">${cnt} 件</span>
        </div>
        <div style="height:6px;background:var(--bg-dark);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${colors[i%colors.length]};border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1);"></div>
        </div>
        <div style="font-size:11px;color:var(--text-light);margin-top:4px;text-align:right">${pct}%</div>
      </div>`;
    }).join('');

  // pending badge
  const pb = document.getElementById('pendingBadge');
  if (pb && (pending + process) > 0) {
    pb.textContent = pending + process;
    pb.style.display = '';
  }

  // 逾期警示（超過 7 天）
  if (data.overdueItems && data.overdueItems.length > 0) {
    const card = document.getElementById('overdueCard');
    card.style.display = '';
    document.getElementById('overdueBadge').textContent = data.overdueItems.length;
    document.getElementById('overdueList').innerHTML = data.overdueItems.slice(0,3).map(item =>
      `<div style="padding:10px 0;border-bottom:1px solid var(--border-inner);font-size:13px;cursor:pointer" onclick="Sidebar.navigate('cases-detail?id=${item.id}')">
        <div style="font-weight:600">${item.title}</div>
        <div style="color:var(--danger);font-size:12px;margin-top:2px;">已逾期 ${DateUtil.diffDays(item.createdAt)} 天</div>
      </div>`
    ).join('') + (data.overdueItems.length > 3 ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;">還有 ${data.overdueItems.length-3} 件逾期案件</div>` : '');
  }
}

// ── 載入近期案件
async function loadRecentCases() {
  const data = await API.cases.list({ page: 1, limit: 5, sort: 'createdAt:desc' });
  const wrap = document.getElementById('recentCasesWrap');
  if (!data || !data.items || data.items.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">尚無案件</div></div>';
    return;
  }
  wrap.innerHTML = data.items.map(item => `
    <div style="padding:12px 0;border-bottom:1px solid var(--border-inner);cursor:pointer;transition:background .15s;"
         onclick="Sidebar.navigate('cases-detail?id=${item.id}')"
         onmouseenter="this.style.background='rgba(123,159,224,0.05)'"
         onmouseleave="this.style.background=''">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <span style="font-size:11px;color:var(--text-muted);font-family:monospace">${item.caseId||'—'}</span>
        ${Status.badge(item.status)}
        <span style="margin-left:auto;font-size:11px;color:var(--text-light)">${DateUtil.fmt(item.createdAt)}</span>
      </div>
      <div style="font-size:14px;font-weight:600;color:var(--text)">${item.title||'—'}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${item.caseType||''} · ${item.caseArea||''}</div>
    </div>`).join('');
}

// ── 匯出 CSV
async function exportCSV() {
  if (!Auth.isAdmin()) { toast.warn('需要管理員權限'); return; }
  toast.info('正在產生 CSV…');
  const data = await API.cases.list({ limit: 9999, export: true });
  if (!data?.items) { toast.error('匯出失敗'); return; }

  const headers = ['案件編號','標題','類型','區域','狀態','建立時間','結案日期','陳情人','手機','Email'];
  const rows = data.items.map(i => [
    i.caseId,i.title,i.caseType,i.caseArea,i.status,
    DateUtil.fmt(i.createdAt),i.closedDate||'',
    i.name||'',i.phone||'',i.email||''
  ]);
  const csv = [headers,...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `cases_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast.success('CSV 匯出成功');
}

loadAll();
</script>
</body>
</html>
