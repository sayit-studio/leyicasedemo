<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LIFF Flex 分享測試</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="share-panel" aria-labelledby="page-title">
        <p class="eyebrow">LINE OA MGM Share</p>
        <h1 id="page-title">好友分享測試</h1>
        <p class="lead">
          點擊下方按鈕後，選擇 LINE 好友或群組，系統會送出完整 Flex Message 測試包。
        </p>

        <div class="status-box" id="statusBox" role="status" aria-live="polite">
          準備初始化 LIFF。
        </div>

        <div class="actions">
          <button class="primary-button" id="shareButton" type="button" disabled>
            分享 Flex 測試包
          </button>
          <button class="secondary-button" id="previewButton" type="button">
            查看測試 JSON
          </button>
        </div>

        <details class="debug-panel" id="debugPanel">
          <summary>Flex Message JSON</summary>
          <pre id="jsonPreview"></pre>
        </details>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);

      const CONFIG = {
        liffId: params.get("liffId") || "2007930859-PMmcwbZV",
        n8nWebhookUrl:
          params.get("webhook") || "https://example.com/webhook/line-mgm-conversion",
        referralId: params.get("ref") || "demo-referrer",
        campaignId: params.get("campaign") || "demo-campaign",
        autoShare: params.get("auto") !== "0",
        allowMultipleRecipients: params.get("single") !== "1"
      };

      const state = {
        initialized: false,
        readyToShare: false,
        sharing: false
      };

      const statusBox = document.querySelector("#statusBox");
      const shareButton = document.querySelector("#shareButton");
      const previewButton = document.querySelector("#previewButton");
      const debugPanel = document.querySelector("#debugPanel");
      const jsonPreview = document.querySelector("#jsonPreview");

      function buildTrackedUrl(actionName) {
        const url = new URL(CONFIG.n8nWebhookUrl);
        url.searchParams.set("source", "line_liff_share");
        url.searchParams.set("action", actionName);
        url.searchParams.set("ref", CONFIG.referralId);
        url.searchParams.set("campaign", CONFIG.campaignId);
        return url.toString();
      }

      function buildFlexMessage() {
        return {
          type: "flex",
          altText: "好友推薦分享測試",
          contents: {
            type: "bubble",
            size: "mega",
            hero: {
              type: "image",
              url: "https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=1200&q=80",
              size: "full",
              aspectRatio: "20:13",
              aspectMode: "cover"
            },
            body: {
              type: "box",
              layout: "vertical",
              spacing: "md",
              contents: [
                {
                  type: "text",
                  text: "好友限定推薦",
                  weight: "bold",
                  size: "xl",
                  color: "#111827"
                },
                {
                  type: "text",
                  text: "這是一則 LIFF Share Target Picker 測試訊息，會以完整 Flex Message 格式分享給好友。",
                  wrap: true,
                  size: "sm",
                  color: "#374151"
                },
                {
                  type: "box",
                  layout: "vertical",
                  margin: "lg",
                  spacing: "sm",
                  contents: [
                    {
                      type: "box",
                      layout: "baseline",
                      spacing: "sm",
                      contents: [
                        {
                          type: "text",
                          text: "推薦碼",
                          color: "#6b7280",
                          size: "sm",
                          flex: 2
                        },
                        {
                          type: "text",
                          text: CONFIG.referralId,
                          wrap: true,
                          color: "#111827",
                          size: "sm",
                          flex: 5
                        }
                      ]
                    },
                    {
                      type: "box",
                      layout: "baseline",
                      spacing: "sm",
                      contents: [
                        {
                          type: "text",
                          text: "活動",
                          color: "#6b7280",
                          size: "sm",
                          flex: 2
                        },
                        {
                          type: "text",
                          text: CONFIG.campaignId,
                          wrap: true,
                          color: "#111827",
                          size: "sm",
                          flex: 5
                        }
                      ]
                    }
                  ]
                }
              ]
            },
            footer: {
              type: "box",
              layout: "vertical",
              spacing: "sm",
              contents: [
                {
                  type: "button",
                  style: "primary",
                  color: "#06c755",
                  action: {
                    type: "uri",
                    label: "領取好友推薦",
                    uri: buildTrackedUrl("claim")
                  }
                },
                {
                  type: "button",
                  style: "link",
                  action: {
                    type: "uri",
                    label: "了解更多",
                    uri: buildTrackedUrl("learn_more")
                  }
                }
              ],
              flex: 0
            }
          }
        };
      }

      function setStatus(message, tone = "default") {
        statusBox.textContent = message;
        statusBox.dataset.tone = tone;
      }

      function refreshPreview() {
        jsonPreview.textContent = JSON.stringify([buildFlexMessage()], null, 2);
      }

      function enableShare() {
        state.readyToShare = true;
        shareButton.disabled = false;
      }

      function isPlaceholderLiffId() {
        return !CONFIG.liffId || CONFIG.liffId === "YOUR_LIFF_ID";
      }

      async function initLiff() {
        refreshPreview();

        if (isPlaceholderLiffId()) {
          setStatus(
            "尚未設定 LIFF ID。目前只能預覽畫面與 JSON，請用 ?liffId=你的LIFF_ID 或直接修改 CONFIG.liffId。",
            "warning"
          );
          return;
        }

        if (!window.liff) {
          setStatus("LIFF SDK 尚未載入，請確認網路連線或 SDK URL。", "error");
          return;
        }

        try {
          setStatus("正在初始化 LIFF。");
          await liff.init({ liffId: CONFIG.liffId });
          state.initialized = true;

          if (!liff.isLoggedIn()) {
            setStatus("尚未登入 LINE，正在導向登入。");
            liff.login({ redirectUri: window.location.href });
            return;
          }

          if (!liff.isApiAvailable("shareTargetPicker")) {
            setStatus(
              "目前環境無法使用 Share Target Picker。請確認 LINE Developers 已啟用此功能，並在 LINE 或支援的 HTTPS 環境測試。",
              "error"
            );
            return;
          }

          setStatus("LIFF 已就緒，可以分享完整 Flex 測試包。", "success");
          enableShare();

          if (CONFIG.autoShare) {
            await shareFlexPackage();
          }
        } catch (error) {
          console.error(error);
          setStatus(`LIFF 初始化失敗：${error.message || error}`, "error");
        }
      }

      async function shareFlexPackage() {
        if (!state.initialized || !state.readyToShare || state.sharing) {
          return;
        }

        state.sharing = true;
        shareButton.disabled = true;
        setStatus("正在開啟好友選擇畫面。");

        try {
          await liff.shareTargetPicker([buildFlexMessage()], {
            isMultiple: CONFIG.allowMultipleRecipients
          });

          setStatus("分享流程已完成。", "success");

          if (liff.isInClient()) {
            window.setTimeout(() => liff.closeWindow(), 700);
          }
        } catch (error) {
          console.error(error);
          setStatus(`分享失敗或已取消：${error.message || error}`, "error");
          shareButton.disabled = false;
        } finally {
          state.sharing = false;
        }
      }

      shareButton.addEventListener("click", shareFlexPackage);
      previewButton.addEventListener("click", () => {
        refreshPreview();
        debugPanel.open = !debugPanel.open;
      });

      initLiff();
    </script>
  </body>
</html>
