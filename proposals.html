<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="leyi/assets/brand/logo.png">
<title>國會提案 — 管理後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🏛️</div><div class="brand-text"><div class="brand-name">市民服務平台</div><div class="brand-role">Admin Console</div></div></div>
    <div class="sidebar-user"><div class="user-avatar" id="sidebarAvatar">A</div><div class="user-info"><div class="user-name" id="sidebarUserName">載入中…</div><span class="user-tag" id="sidebarUserTag">幕僚</span></div></div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">主要功能</div>
      <div class="nav-item" onclick="Sidebar.navigate('dashboard')"><span class="nav-icon">📊</span><span class="nav-label">儀表板</span></div>
      <div class="nav-item" onclick="Sidebar.navigate('cases')"><span class="nav-icon">📋</span><span class="nav-label">案件管理</span></div>
      <div class="nav-item" onclick="Sidebar.navigate('cases-new')"><span class="nav-icon">✏️</span><span class="nav-label">新增案件</span></div>
      <div class="nav-group-label">政績版功能</div>
      <div class="nav-item" onclick="Sidebar.navigate('inspections')"><span class="nav-icon">🏗️</span><span class="nav-label">現場會勘</span></div>
      <div class="nav-item" onclick="Sidebar.navigate('interpellations')"><span class="nav-icon">🎤</span><span class="nav-label">國會質詢</span></div>
      <div class="nav-item active" onclick="Sidebar.navigate('proposals')"><span class="nav-icon">📜</span><span class="nav-label">國會提案</span></div>
      <div class="nav-group-label" data-role="admin">管理功能</div>
      <div class="nav-item" onclick="Sidebar.navigate('users')" data-role="admin"><span class="nav-icon">👥</span><span class="nav-label">帳號管理</span></div>
      <div class="nav-item" onclick="Sidebar.navigate('settings')" data-role="admin"><span class="nav-icon">⚙️</span><span class="nav-label">系統設定</span></div>
      <div class="nav-item" onclick="Sidebar.navigate('super-admin')" data-role="super_admin"><span class="nav-icon">🔑</span><span class="nav-label">Super Admin</span></div>
    </nav>
    <div class="sidebar-footer"><button class="sidebar-toggle" onclick="Sidebar.toggle()"><span class="toggle-icon">◀</span><span class="toggle-label">收合選單</span></button></div>
  </aside>

  <div class="main-content" id="mainContent">
    <div class="topbar">
      <div><div class="topbar-title">國會提案管理</div><div class="topbar-subtitle" id="totalCount">載入中…</div></div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm" onclick="openAdd()">＋ 新增提案</button>
        <button class="topbar-btn" onclick="load()">🔄</button>
        <button class="topbar-btn" onclick="Auth.logout()">🚪</button>
      </div>
    </div>

    <div class="page-area">
      <div class="filter-row">
        <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜尋提案名稱…" oninput="debounce()"></div>
        <select class="neu-select" style="width:140px;" id="typeFilter" onchange="load()">
          <option value="">全部類型</option>
          <option>法律案</option><option>預算案</option><option>決議案</option>
        </select>
        <select class="neu-select" style="width:160px;" id="statusFilter" onchange="load()">
          <option value="">全部進度</option>
          <option>提案中</option><option>委員會審查</option><option>院會審查</option>
          <option>三讀通過</option><option>撤回</option>
        </select>
      </div>

      <!-- 看板式列表 -->
      <div id="kanbanWrap" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">
        <div class="loading-row" style="grid-column:1/-1;"><div class="spinner"></div>載入中…</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- 新增/編輯 Modal -->
<div class="modal-backdrop" id="editModal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">新增提案</span>
      <button class="modal-close" onclick="Modal.close('editModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="grid-2" style="gap:16px;">
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">提案標題 <span class="req">*</span></label>
          <input type="text" class="neu-input" id="e-title" placeholder="法案或決議案名稱">
        </div>
        <div class="form-group">
          <label class="form-label">提案日期 <span class="req">*</span></label>
          <input type="date" class="neu-input" id="e-date" style="padding-left:16px;">
        </div>
        <div class="form-group">
          <label class="form-label">提案類型</label>
          <select class="neu-select" id="e-type">
            <option>法律案</option><option>預算案</option><option>決議案</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">提案進度</label>
          <select class="neu-select" id="e-status">
            <option>提案中</option><option>委員會審查</option>
            <option>院會審查</option><option>三讀通過</option><option>撤回</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1;margin:0;">
          <label class="form-label">提案摘要</label>
          <textarea class="neu-textarea" id="e-summary" rows="4" placeholder="公開說明，市民可見…"></textarea>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
        <label class="form-label" style="margin:0;">對外公開</label>
        <div class="neu-toggle" id="e-pub" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="Modal.close('editModal')">取消</button>
      <button class="btn btn-primary" onclick="saveRecord()">儲存</button>
    </div>
  </div>
</div>

<div class="toast-wrap"></div>
<script src="js/config.js"></script>
<script src="js/admin.js"></script>
<script>
Auth.require('staff');
let _search='',_page=1,_timer,_editId=null;

const STATUS_COLOR = {
  '提案中':     {bg:'var(--primary-pale)',   tc:'var(--primary-dark)'},
  '委員會審查': {bg:'var(--warning-pale)',   tc:'var(--warning)'},
  '院會審查':   {bg:'#F3EAFD',              tc:'#7B3EC4'},
  '三讀通過':   {bg:'var(--success-pale)',   tc:'#1A7A5E'},
  '撤回':       {bg:'var(--danger-pale)',    tc:'var(--danger)'},
};

function debounce(){clearTimeout(_timer);_timer=setTimeout(()=>{_search=document.getElementById('searchInput').value.trim();_page=1;load();},400);}

async function load(){
  const grid=document.getElementById('kanbanWrap');
  grid.innerHTML='<div class="loading-row" style="grid-column:1/-1;"><div class="spinner"></div>載入中…</div>';
  const params={page:_page,limit:12};
  if(_search) params.q=_search;
  const t=document.getElementById('typeFilter').value; if(t) params.type=t;
  const s=document.getElementById('statusFilter').value; if(s) params.status=s;

  const data=await API.proposals.list(params);
  document.getElementById('totalCount').textContent=`共 ${data?.total||0} 筆提案`;
  if(!data?.items?.length){
    grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📜</div><div class="empty-title">尚無提案紀錄</div></div>';
    return;
  }
  grid.innerHTML=data.items.map(item=>{
    const sc=STATUS_COLOR[item.status]||{bg:'var(--bg-dark)',tc:'var(--text-muted)'};
    return `<div class="neu-card" style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--r-full);background:${sc.bg};color:${sc.tc};">${item.status||'提案中'}</span>
        <span style="font-size:11px;background:var(--bg-dark);color:var(--text-muted);padding:3px 8px;border-radius:var(--r-full);">${item.type||'法律案'}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--text-light);">${DateUtil.fmt(item.date)}</span>
      </div>
      <div style="font-weight:700;font-size:15px;line-height:1.4;">${item.title||'—'}</div>
      ${item.summary?`<div style="font-size:13px;color:var(--text-muted);line-height:1.7;">${item.summary.slice(0,100)}${item.summary.length>100?'…':''}</div>`:''}
      <div style="display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:8px;border-top:1px solid var(--border-inner);">
        <div class="neu-toggle ${item.isPublic?'on':''}" onclick="quickPub('${item.id}',${item.isPublic},this)" style="width:36px;height:20px;"></div>
        <span style="font-size:12px;color:var(--text-muted);">${item.isPublic?'已公開':'未公開'}</span>
        <div style="margin-left:auto;display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="openEdit('${item.id}')">✏️ 編輯</button>
          ${Auth.isAdmin()?`<button class="btn btn-sm" style="color:var(--danger)" onclick="del('${item.id}')">🗑</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function quickPub(id,cur,el){
  const r=await API.proposals.update(id,{isPublic:!cur});
  if(r?.success) el.classList.toggle('on',!cur); else toast.error('操作失敗');
}

function openAdd(){
  _editId=null;
  document.getElementById('modalTitle').textContent='新增提案';
  ['e-title','e-summary'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('e-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('e-pub').classList.remove('on');
  Modal.open('editModal');
}

async function openEdit(id){
  _editId=id;
  document.getElementById('modalTitle').textContent='編輯提案';
  const data=await API.get(`/proposals/${id}`);
  if(data?.item){
    const i=data.item;
    document.getElementById('e-title').value  =i.title  ||'';
    document.getElementById('e-date').value   =i.date?.split('T')[0]||'';
    document.getElementById('e-type').value   =i.type   ||'法律案';
    document.getElementById('e-status').value =i.status ||'提案中';
    document.getElementById('e-summary').value=i.summary||'';
    document.getElementById('e-pub').classList.toggle('on',!!i.isPublic);
  }
  Modal.open('editModal');
}

async function saveRecord(){
  const body={
    title:   document.getElementById('e-title').value.trim(),
    date:    document.getElementById('e-date').value,
    type:    document.getElementById('e-type').value,
    status:  document.getElementById('e-status').value,
    summary: document.getElementById('e-summary').value.trim(),
    isPublic:document.getElementById('e-pub').classList.contains('on'),
  };
  if(!body.title||!body.date){toast.warn('請填寫標題與日期');return;}
  const r=_editId?await API.proposals.update(_editId,body):await API.proposals.create(body);
  if(r?.success){toast.success(_editId?'已更新':'已新增');Modal.close('editModal');load();}
  else toast.error('操作失敗');
}

function del(id){
  Modal.confirm('確認刪除','確定要刪除這筆提案紀錄嗎？',async()=>{
    const r=await API.proposals.delete(id);
    if(r?.success){toast.success('已刪除');load();}else toast.error('刪除失敗');
  });
}

load();
</script>
</body>
</html>
